server {
    listen 80;
    server_name avaliadorprompt.com www.avaliadorprompt.com;

    # Frontend
    location / {
        root /var/www/avaliadorprompt/frontend;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # Backend API - Configuração melhorada
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Aumentar timeout para evitar 502
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        
        # Aumentar buffer para respostas grandes
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Log de erros e acessos
    access_log /var/log/nginx/avaliadorprompt.access.log;
    error_log /var/log/nginx/avaliadorprompt.error.log;
    
    # Configuração SSL - Já deve existir se certbot foi executado
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/avaliadorprompt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avaliadorprompt.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Redirecionar HTTP para HTTPS (redundante se certbot já configurou, mas por garantia)
    if ($scheme != "https") {
        return 301 https://$host$request_uri;
    }
}
